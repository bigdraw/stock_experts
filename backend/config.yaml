server:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"

database:
  url: "sqlite+aiosqlite:///./data/stock.db"

auth:
  secret_key: "***REMOVED***"
  algorithm: "HS256"
  token_expire_minutes: 1440

llm:
  default_provider: "qwen"
  providers:
    qwen:
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      api_key: "${LLM_API_KEY}"
      model: "qwen3.7-max"
      max_tokens: 65536
      temperature: 0.7

data_source:
  default_provider: "akshare"
  providers:
    akshare:
      rate_limit: 10
      retry_max: 3

backtest:
  friction:
    stamp_tax: 0.0005
    commission: 0.00025
    commission_min: 5.0
    slippage: 0.001

scheduler:
  daily_update_time: "16:30"
  backup_day: "sunday"
